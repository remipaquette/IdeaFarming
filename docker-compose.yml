services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ideafarming
      POSTGRES_USER: ideafarming
      POSTGRES_PASSWORD: ideafarming
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideafarming"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://ideafarming:ideafarming@db:5432/ideafarming
      PORT: "3000"
      JWT_SECRET: "dev-secret-change-in-production-min-32-chars!!"
      CORS_ORIGIN: "http://localhost:5173"
      NODE_ENV: "development"
      ADMIN_SEED_EMAIL: "admin@company.com"
      ADMIN_SEED_PASSWORD: "Admin1234!"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  uploads_data:
